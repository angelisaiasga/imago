<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGO - Magia Audiovisual</title>
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-light: #f0f0f0;
            --magic-glitter-1: rgba(0, 210, 255, 0.9);
            --magic-glitter-2: rgba(157, 80, 187, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            user-select: none; 
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .card {
            background: var(--primary-bg);
            width: 90%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 210, 255, 0.15);
            border: 1px solid #333;
            text-align: center;
            transition: box-shadow 0.3s ease;
            contain: content;
            margin: 20px 0;
            position: relative;
            z-index: 1; /* Asegura que la tarjeta esté debajo del botón flotante */
        }

        .header-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid var(--neon-blue);
            background-color: #1a1a1a;
        }

        .logo-container {
            margin-top: -55px;
            position: relative;
            z-index: 10;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            background: #000;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 20px var(--neon-blue);
            object-fit: contain;
        }

        .brand-section { padding: 20px 30px; }

        .brand-name {
            font-size: 2.6em;
            font-weight: 900;
            letter-spacing: 5px;
            margin: 15px 0 5px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.9em;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .menu-list { list-style: none; padding: 0; margin: 0; }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.06);
            margin-bottom: 12px;
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            border-left: 4px solid var(--neon-purple);
            font-weight: 500;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        /* --- ESTILOS DEL BOTÓN FLOTANTE MÁGICO (NUEVO) --- */
        .magic-contact-float {
            position: fixed;
            width: 70px;
            height: 70px;
            bottom: 30px;
            right: 30px;
            z-index: 2000; /* Siempre encima de todo */
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px var(--magic-glitter-1));
        }

        /* Capa 1: El Lente Externo Giratorio */
        .magic-contact-float .lens-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed var(--neon-blue);
            box-sizing: border-box;
            animation: rotate-clockwise 15s linear infinite;
            opacity: 0.6;
        }

        /* Capa 2: El Núcleo de Energía y Glitter */
        .magic-contact-float .core-inner {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: conic-gradient(from 180deg at 50% 50%, #fff 0deg, var(--neon-blue) 100deg, var(--neon-purple) 220deg, #fff 360deg);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.5), 0 0 20px var(--neon-purple);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Efecto Glitter dentro del núcleo */
        .magic-contact-float .core-inner::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 50% 50%, #fff 1.5px, transparent 1.5px),
                radial-gradient(circle at 20% 80%, var(--magic-glitter-1) 2px, transparent 2px),
                radial-gradient(circle at 80% 30%, var(--magic-glitter-2) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: twinkling-fast 1s linear infinite;
        }

        /* El icono de chat neón */
        .magic-contact-float .icon {
            font-size: 32px;
            position: relative;
            z-index: 5;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-blue);
            transform: translateY(-2px);
        }

        /* Animaciones */
        @keyframes rotate-clockwise { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-anticlockwise { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes twinkling-fast {
            0% { background-position: 0 0; opacity: 0.8; }
            50% { background-position: 20px 20px; opacity: 1; }
            100% { background-position: 40px 40px; opacity: 0.8; }
        }

        /* Comportamiento Hover (Llamativo) */
        .magic-contact-float:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px var(--neon-purple));
        }

        .magic-contact-float:hover .lens-outer {
            animation-duration: 4s; /* Gira muy rápido al tocarlo */
            opacity: 1;
            border-style: solid;
        }

        /* Ajuste Móvil */
        @media (max-width: 480px) {
            .magic-contact-float {
                width: 60px;
                height: 60px;
                bottom: 20px;
                right: 20px;
            }
            .magic-contact-float .icon { font-size: 28px; }
        }

        .footer { padding: 20px 30px 40px; font-size: 0.8em; opacity: 0.4; letter-spacing: 1px;}
    </style>
</head>
<body oncontextmenu="return false;">

<div class="card">

            </a>

                <span>▶</span>
            </a>
        </div>
    </div>

    <div class="footer">© 2026 IMAGO AUDIOVISUALES</div>
</div>

<a href="https://wa.me/528671132858?text=Hola%2C%20vi%20su%20App%20y%20me%20gustar%C3%ADa%20cotizar%20un%20proyecto%20audiovisual." 
   class="magic-contact-float" 
   target="_blank" 
   title="Inicia la Magia por WhatsApp">

    <div class="core-inner">
        <span class="icon">💬</span>
    </div>
</a>

</body>
</html>
