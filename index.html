<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGO - Magia Audiovisual</title>
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-light: #f0f0f0;
            --magic-glitter-1: rgba(0, 210, 255, 0.9);
            --magic-glitter-2: rgba(157, 80, 187, 0.9);
            --whatsapp-green: #25D366;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            user-select: none; 
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .card {
            background: var(--primary-bg);
            width: 90%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 210, 255, 0.15);
            border: 1px solid #333;
            text-align: center;
            transition: box-shadow 0.3s ease;
            contain: content;
            margin: 20px 0;
        }

        .card:hover {
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.9), 0 0 25px rgba(0, 210, 255, 0.25);
        }

        .header-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid var(--neon-blue);
            pointer-events: none;
            background-color: #1a1a1a;
        }

        .logo-container {
            margin-top: -55px;
            position: relative;
            z-index: 10;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            background: #000;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 20px var(--neon-blue);
            object-fit: contain;
            pointer-events: none;
        }

        .brand-section { padding: 20px 30px; }

        .brand-name {
            font-size: 2.6em;
            font-weight: 900;
            letter-spacing: 5px;
            margin: 15px 0 5px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.9em;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .menu-list { list-style: none; padding: 0; margin: 0; }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.06);
            margin-bottom: 12px;
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            border-left: 4px solid var(--neon-purple);
            font-weight: 500;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .menu-link::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, var(--magic-glitter-1) 1.5px, transparent 1.5px),
                radial-gradient(circle at 80% 40%, var(--magic-glitter-2) 2px, transparent 2px),
                radial-gradient(circle at 30% 70%, var(--magic-glitter-1) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.4s ease;
        }

        .menu-link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-left-color: var(--neon-blue);
            transform: scale(1.03);
        }

        .menu-link:hover::before {
            opacity: 1;
            animation: twinkling 1.5s linear infinite;
        }

        @keyframes twinkling {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .menu-link span { position: relative; z-index: 2; }
        .footer { padding: 20px 30px 40px; font-size: 0.8em; opacity: 0.4; letter-spacing: 1px;}

        /* --- BOTÓN FLOTANTE DE WHATSAPP --- */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--whatsapp-green) 0%, var(--neon-blue) 100%);
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), 0 0 10px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .whatsapp-float:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
        }

        /* Efecto de pulso discreto */
        .whatsapp-float::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--whatsapp-green);
            animation: pulse-ring 2s infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @media (max-width: 480px) {
            .whatsapp-float {
                width: 55px;
                height: 55px;
                bottom: 20px;
                right: 20px;
                font-size: 28px;
            }
        }

    </style>
</head>
<body oncontextmenu="return false;">

<div class="card">
    <img src="Encabezado.png" alt="Encabezado IMAGO" class="header-img" fetchpriority="high" loading="eager">
    
    <div class="logo-container">
        <img src="Logo.png" alt="Logo IMAGO" class="logo-img" loading="lazy">
    </div>

    <div class="brand-section">
        <h1 class="brand-name">IMAGO</h1>
        <div class="tagline">Magia Audiovisual</div>
        
        <div class="menu-list">
            <a href="https://www.facebook.com" target="_blank" class="menu-link">
                <span>📘 Ve nuestro trabajo en Facebook</span>
                <span>▶</span>
            </a>
            <a href="https://www.instagram.com" target="_blank" class="menu-link">
                <span>📸 Ve nuestro trabajo en Instagram</span>
                <span>▶</span>
            </a>
        </div>
    </div>

    <div class="footer">© 2026 IMAGO AUDIOVISUALES</div>
</div>

   class="whatsapp-float"

<script>
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false;
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    }
</script>

</body>
</html>
