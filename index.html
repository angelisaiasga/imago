<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGO - Magia Audiovisual</title>
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-light: #f0f0f0;
            --main-glow: 0 0 15px rgba(0, 210, 255, 0.7);
            --secondary-glow: 0 0 15px rgba(157, 80, 187, 0.7);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            user-select: none; 
            -webkit-user-select: none;
            overflow: hidden; /* Previene scroll si los flotantes se mueven */
        }

        /* --- LA TARJETA PRINCIPAL (SE MANTIENE IGUAL) --- */
        .card {
            background: var(--primary-bg);
            width: 90%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 210, 255, 0.15);
            border: 1px solid #333;
            text-align: center;
            transition: box-shadow 0.3s ease;
            contain: content;
            position: relative;
            z-index: 1; /* Debajo de los botones flotantes */
        }

        .card:hover {
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.9), 0 0 25px rgba(0, 210, 255, 0.25);
        }

        .header-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            border-bottom: 3px solid var(--neon-blue);
            background-color: #1a1a1a;
        }

        .logo-container {
            margin-top: -55px;
            position: relative;
            z-index: 10;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            background: #000;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 20px var(--neon-blue);
            object-fit: contain;
        }

        .brand-section { padding: 20px 30px 40px; } /* Más relleno inferior al no haber menú */

        .brand-name {
            font-size: 2.6em;
            font-weight: 900;
            letter-spacing: 5px;
            margin: 15px 0 5px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.9em;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }

        .footer { padding: 20px 30px; font-size: 0.8em; opacity: 0.4; letter-spacing: 1px;}


        /* --- SISTEMA DE BOTONES FLOTANTES (NUEVO) --- */
        .floating-magic-bar {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column-reverse; /* WhatsApp abajo, redes arriba */
            align-items: center;
            gap: 15px; /* Espacio entre botones satélites */
            z-index: 2000; /* Siempre encima */
        }

        /* Estilos comunes para los botones satélites (FB/IG) */
        .satellite-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            opacity: 0.9;
        }

        .satellite-button:hover {
            transform: scale(1.1) translateY(-5px);
            opacity: 1;
        }

        .satellite-button svg {
            width: 24px;
            height: 24px;
            fill: white;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8));
        }

        /* Facebook Flotante Neón */
        .float-fb {
            background-color: #1877F2; /* Azul FB base */
            box-shadow: 0 0 15px rgba(24, 119, 242, 0.7);
            border-color: rgba(24, 119, 242, 0.5);
        }
        .float-fb:hover {
            box-shadow: 0 0 25px rgba(24, 119, 242, 1);
        }

        /* Instagram Flotante Neón */
        .float-ig {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
            box-shadow: 0 0 15px rgba(214, 36, 159, 0.7);
            border-color: rgba(214, 36, 159, 0.5);
        }
        .float-ig:hover {
            box-shadow: 0 0 25px rgba(214, 36, 159, 1);
        }


        /* --- DISEÑO EXCLUSIVO WHATSAPP "ARTEFACTO DE ENFOQUE" --- */
        .float-wa-magic {
            width: 75px;
            height: 75px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.3s ease;
            margin-top: 10px; /* Separación de las redes */
        }

        .float-wa-magic:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Anillo Externo Giratorio (Dashed) */
        .wa-ring-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed var(--neon-blue);
            box-sizing: border-box;
            animation: rotate-clockwise 15s linear infinite;
            opacity: 0.5;
            filter: drop-shadow(var(--main-glow));
        }

        /* Anillo Interno Giratorio (Solid) */
        .wa-ring-inner {
            position: absolute;
            width: 82%;
            height: 82%;
            border-radius: 50%;
            border: 2px solid var(--neon-purple);
            box-sizing: border-box;
            animation: rotate-anticlockwise 10s linear infinite;
            filter: drop-shadow(var(--secondary-glow));
        }

        /* Núcleo de Energía Brillante (El botón real) */
        .wa-core {
            position: absolute;
            width: 65%;
            height: 65%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-blue) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.3), 0 0 20px rgba(0, 210, 255, 0.5);
            overflow: hidden;
            z-index: 10;
        }

        /* Efecto de destello "Glitter" dentro del núcleo */
        .wa-core::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(circle at 50% 50%, #fff 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
            animation: glitter-micro 2s linear infinite;
        }

        /* Icono de WhatsApp Blanco Neón */
        .wa-core svg {
            width: 28px;
            height: 28px;
            fill: white;
            filter: drop-shadow(0 0 5px #fff);
            position: relative;
            z-index: 11;
        }

        /* Animaciones */
        @keyframes rotate-clockwise { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-anticlockwise { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes glitter-micro { 0% { transform: translate(0,0); } 100% { transform: translate(-20px, -20px); } }

        /* Ajustes Móviles */
        @media (max-width: 480px) {
            .floating-magic-bar { bottom: 20px; right: 20px; gap: 10px; }
            .satellite-button { width: 45px; height: 45px; }
            .float-wa-magic { width: 65px; height: 65px; }
            .wa-core svg { width: 24px; height: 24px; }
        }

    </style>
</head>
