<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGO - Magia Audiovisual</title>
    <style>
        :root {
            --primary-bg: #050505;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-light: #f0f0f0;
            --glass-text: rgba(240, 240, 240, 0.7);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- BACKGROUND ATMOSFÉRICO --- */
        #particles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            filter: blur(1px);
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* --- TARJETA PRINCIPAL --- */
        .card {
            background: rgba(10, 10, 10, 0.9);
            width: 95%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            margin: 20px 0 120px 0; 
        }

        .header-img { width: 100%; height: 150px; object-fit: cover; border-bottom: 3px solid var(--neon-blue); }
        .logo-container { margin-top: -50px; position: relative; z-index: 10; }
        .logo-img { width: 100px; height: 100px; background: #000; border: 4px solid var(--neon-blue); border-radius: 50%; padding: 5px; box-shadow: 0 0 20px var(--neon-blue); }

        .brand-name { font-size: 2.2em; font-weight: 900; letter-spacing: 5px; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin: 15px 0 10px; }

        .services-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; padding: 0 10px; }
        .service-chip { 
            font-size: 0.65em; 
            padding: 5px 12px; 
            border-radius: 20px; 
            border: 1px solid var(--neon-purple); 
            background: rgba(157, 80, 187, 0.2); 
            box-shadow: 0 0 10px rgba(157, 80, 187, 0.3); 
            color: #fff; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- DESCRIPCIÓN BREVE --- */
        .description-text {
            font-size: 0.85em;
            line-height: 1.5;
            color: var(--glass-text);
            padding: 0 35px;
            margin-bottom: 25px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .description-text strong {
            color: var(--neon-blue);
            font-weight: 500;
        }

        /* --- GALERÍA HEXAGONAL --- */
        .gallery-container { padding: 0 10px 60px; display: flex; flex-wrap: wrap; justify-content: center; max-width: 350px; margin: 0 auto; }
        .hexagon { width: 90px; height: 100px; position: relative; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); margin: -10px 2px; transition: 0.4s; cursor: pointer; background: #222; z-index: 1; }
        .hexagon img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(60%) brightness(0.7); transition: 0.4s ease; }
        .hexagon:nth-child(3n+2) { transform: translateY(50px); }
        .hexagon:hover { transform: scale(1.1); z-index: 50; filter: drop-shadow(0 0 15px var(--neon-blue)); }
        .hexagon:hover img { filter: grayscale(0%) brightness(1.1); }

        /* --- SISTEMA DOCK MÁGICO ADAPTATIVO --- */
        .floating-magic-bar { position: fixed; z-index: 2000; display: flex; transition: all 0.4s ease; }

        @media (min-width: 769px) {
            .floating-magic-bar { bottom: 30px; right: 30px; flex-direction: column-reverse; gap: 20px; }
            .tooltip { position: absolute; right: 85px; opacity: 0; transform: translateX(20px); }
            .nav-item:hover .tooltip { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .floating-magic-bar {
                bottom: 20px; left: 50%; transform: translateX(-50%);
                background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
                padding: 10px 25px; border-radius: 40px; flex-direction: row; gap: 20px;
                border: 1px solid rgba(0, 210, 255, 0.4); width: auto;
            }
            .tooltip { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(10px); opacity: 0; }
            .nav-item:active .tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .nav-item { position: relative; display: flex; align-items: center; justify-content: center; }
        .tooltip { background: rgba(10, 10, 10, 0.95); color: white; padding: 8px 15px; border-radius: 10px; border: 1px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); pointer-events: none; transition: 0.3s ease; white-space: nowrap; z-index: 3000; }

        .satellite-button { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .float-fb { background: #1877F2; box-shadow: 0 0 10px #1877F2; }
        .float-ig { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fd5949 45%,#d6249f 60%,#285AEB 90%); box-shadow: 0 0 10px #d6249f; }
        .satellite-button svg { width: 20px; fill: white; }

        .float-wa-magic { width: 60px; height: 60px; position: relative; display: flex; justify-content: center; align-items: center; text-decoration: none; }
        .wa-ring-outer { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px dashed var(--neon-blue); animation: rotate-cw 15s linear infinite; opacity: 0.4; }
        .wa-ring-inner { position: absolute; width: 80%; height: 80%; border-radius: 50%; border: 1.5px solid var(--neon-purple); animation: rotate-acw 10s linear infinite; opacity: 0.4; }
        .wa-core { position: absolute; width: 65%; height: 65%; border-radius: 50%; background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue)); display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--neon-blue); z-index: 10; }
        .wa-core svg { width: 22px; fill: white; }

        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-acw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* --- LIGHTBOX --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .overlay.active { display: flex; }
        .overlay-img { max-width: 85%; max-height: 80%; border-radius: 15px; border: 2px solid var(--neon-blue); box-shadow: 0 0 30px var(--neon-blue); }
        .close-btn { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: #000; border: 2px solid var(--neon-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 20px var(--neon-blue); }
        .close-btn span { color: white; font-size: 30px; }

        .footer { padding-bottom: 20px; font-size: 0.7em; opacity: 0.3; }
    </style>
</head>
<body oncontextmenu="return false;">

            Transformamos ideas en experiencias sensoriales. Somos expertos en <strong>producción audiovisual de alto impacto</strong>, capturando la esencia de cada momento con tecnología de vanguardia.

        <div class="footer">© 2026 IMAGO AUDIOVISUALES</div>

        <div class="close-btn" onclick="closeImg()"><span>&times;</span></div>

    <script>
        function initParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 8 + 4 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.background = Math.random() > 0.5 ? '#00d2ff' : '#9d50bb';
                p.style.boxShadow = `0 0 10px ${p.style.background}`;
                container.appendChild(p);
            }
        }
        initParticles();

        function openImg(src) {
            const overlay = document.getElementById('imageOverlay');
            const fullImg = document.getElementById('fullImg');
            fullImg.src = src;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function closeImg() {
            const overlay = document.getElementById('imageOverlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
        }
    </script>
</body>
</html>
